name: Mark Stale Issues and PRs

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Mark stale issues and pull requests
        uses: actions/stale@v9
        with:
          repo-token: ${{ github.token }}
          stale-issue-message: "This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs within 7 days. Thank you for your contributions!"
          stale-pr-message: "This pull request has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs within 7 days."
          close-issue-message: "This issue has been closed due to inactivity. Feel free to reopen if this is still relevant."
          close-pr-message: "This pull request has been closed due to inactivity. Feel free to reopen when ready."
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,enhancement"
          exempt-pr-labels: "pinned,security"
